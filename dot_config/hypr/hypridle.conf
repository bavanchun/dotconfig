general {
    lock_cmd        = pidof hyprlock || hyprlock   # chạy hyprlock nếu chưa chạy
    before_sleep_cmd = loginctl lock-session        # lock trước khi ngủ
    after_sleep_cmd  = hyprctl dispatch dpms on     # bật màn hình sau khi thức dậy
    ignore_dbus_inhibit = false
}

# Bước 1 (5 phút): Giảm độ sáng màn hình
listener {
    timeout  = 300
    on-timeout = brightnessctl -s set 30%   # lưu độ sáng hiện tại rồi giảm xuống 30%
    on-resume  = brightnessctl -r            # khôi phục độ sáng cũ
}

# Bước 2 (8 phút): Tắt màn hình
listener {
    timeout  = 480
    on-timeout = hyprctl dispatch dpms off
    on-resume  = hyprctl dispatch dpms on
}

# Bước 3 (10 phút): Khóa màn hình
listener {
    timeout  = 600
    on-timeout = loginctl lock-session
}

# Bước 4 (15 phút): Suspend
listener {
    timeout  = 900
    on-timeout = systemctl suspend
}
