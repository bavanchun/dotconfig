general {
    disable_loading_bar = false
    hide_cursor         = true
    grace               = 0
    no_fade_in          = false
}

# ── Auth ─────────────────────────────────────────────────────
auth {
    fingerprint {
        enabled         = true
        ready_message   = Touch fingerprint sensor
        present_message = Scanning...
        retry_delay     = 250
    }
}

# ── Background with blur ─────────────────────────────────────
background {
    monitor =
    path    = screenshot   # capture current screen as background
    blur_passes = 3
    blur_size   = 7
    noise       = 0.0117
    contrast    = 0.8916
    brightness  = 0.8172
    vibrancy    = 0.1696
    vibrancy_darkness = 0.0
}

# ── Avatar ────────────────────────────────────────────────────
image {
    monitor =
    path    = /home/vchun/Pictures/photo_2026-04-18_19-39-09.jpg
    size    = 120
    rounding = -1

    border_size  = 3
    border_color = rgba(199, 62, 100, 1.0)

    position = 0, 330
    halign   = center
    valign   = center
}

# ── Clock ─────────────────────────────────────────────────────
label {
    monitor =
    text    = cmd[update:1000] echo "<span>$(date +"%H:%M")</span>"
    color   = rgba(228, 228, 228, 1.0)
    font_size = 90
    font_family = JetBrainsMono Nerd Font
    font_weight = bold

    position = 0, 80
    halign   = center
    valign   = center
}

label {
    monitor =
    text    = cmd[update:60000] echo "<span>$(date +"%A, %d %B %Y")</span>"
    color   = rgba(168, 168, 168, 1.0)
    font_size = 20
    font_family = JetBrainsMono Nerd Font

    position = 0, -20
    halign   = center
    valign   = center
}

# ── Password input ────────────────────────────────────────────
input-field {
    monitor =
    size     = 300, 55
    outline_thickness = 2
    dots_size         = 0.3
    dots_spacing      = 0.15
    dots_center       = true
    dots_rounding     = -1

    outer_color  = rgba(80, 80, 80, 0.8)
    inner_color  = rgba(15, 15, 15, 0.85)
    font_color   = rgba(228, 228, 228, 1.0)
    fade_on_empty = true
    fade_timeout  = 1000

    placeholder_text = <i>Enter password...</i>
    hide_input        = false
    rounding          = 12

    check_color  = rgba(112, 112, 112, 1.0)
    fail_color   = rgba(192, 96, 96, 1.0)
    fail_text    = <i>Wrong password ($ATTEMPTS)</i>
    fail_transition = 300

    position = 0, -200
    halign   = center
    valign   = center
}

# ── Fingerprint status ────────────────────────────────────────
label {
    monitor =
    text    = 󰾰  $FPRINTPROMPT
    color   = rgba(168, 168, 168, 0.85)
    font_size = 15
    font_family = JetBrainsMono Nerd Font

    position = 0, -275
    halign   = center
    valign   = center
}

label {
    monitor =
    text    = $FPRINTFAIL
    color   = rgba(192, 96, 96, 1.0)
    font_size = 13
    font_family = JetBrainsMono Nerd Font

    position = 0, -305
    halign   = center
    valign   = center
}
