include="~/.config/fuzzel/fuzzel_theme.ini"

font=Google Sans Flex:size=13:weight=semibold
terminal=kitty -1
prompt="terminal  "
placeholder="Search a terminal"
match-mode=fuzzy
layer=overlay
width=44
lines=6
horizontal-pad=22
vertical-pad=18
inner-pad=14
line-height=22
x-margin=14
y-margin=14
letter-spacing=0
show-actions=no

[border]
radius=22
width=2

[dmenu]
exit-immediately-if-empty=yes
